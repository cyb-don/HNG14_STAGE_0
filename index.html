<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="card.css">
</head>

<body id="body">
    <article class="card" data-testid="test-todo-card">

        <form action="" data-testid="test-todo-edit-form">
            <div>
                <div id="titleHeader">
                    <label for="title"><b>Title</b></label>

                </div>
                <div id="prioritySect">
                    <span id="priorityIndicator" data-testid="test-todo-priority-indicator"></span>
                    <select name="" id="prioritySelect" data-testid="test-todo-edit-priority-select" disabled>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
            </div>
            <div id="collapsibleSect" data-testid="test-todo-collapsible-section">
                <label for="description"><b>Description</b></label>

            </div>
            <button type="button" id="expandColToggle" data-testid="test-todo-expand-toggle" aria-expanded="false"
                aria-controls="collapsibleSect">Expand</button>
            <div id="dateSect">
                <div id="dueDateSect">
                    <p>DUE DATE</p>
                    <input type="date" id="editDueDate" data-testid="test-todo-edit-due-date-input" readonly>
                </div>
                <div id="timeRemainingSect">
                    <p>TIME REMAINING</p>
                    <div>
                        <span id="overdueIndicator" data-testid="test-todo-overdue-indicator"></span>
                        <time id="timeRemaining" datetime="" data-testid="test-todo-time-remaining"
                            aria-live="polite"></time>
                    </div>
                </div>
            </div>


            <div id="statusSect">
                <select name="" id="statusControl" data-testid="test-todo-status-control">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
            </div>
            <div id="toggleTagSect">
                <p><input id="toggleCheck" type="checkbox" data-testid="test-todo-complete-toggle"><label
                        for="toggleCheck" style="margin-left:6px;cursor:pointer;">Mark as complete</label></p>
                <ul id="todoTags" data-testid="test-todo-tags">
                    <li id="workTag" data-testid="test-todo-tag-work">Work</li>
                    <li id="urgentTag" data-testid="test-todo-tag-urgent" style="background-color: rgb(255, 0, 0);">Urgent</li>
                    <li id="HomeTag" data-testid="test-todo-tag-home">Home</li>
                </ul>
            </div>

            <div id="buttons">
                <div id="editSaveBtnSect">
                    <button type="button" id="editBtn" data-testid="test-todo-edit-button">Edit</button>
                    <button type="button" id="saveBtn" data-testid="test-todo-save-button">Save</button>
                </div>
                <div id="deleteCancelBtnSect">
                    <button type="button" id="deleteBtn" data-testid="test-todo-delete-button">Delete</button>
                    <button type="button" id="cancelBtn" data-testid="test-todo-cancel-button">Cancel</button>
                </div>
            </div>

        </form>


    </article>


    <script type="module" src="./todocard.js"></script>
</body>

</html>
